name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  precheck:
    name: Verify CI green on release SHA
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Wait for CI success on ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          deadline=$((SECONDS + 1800))
          while (( SECONDS < deadline )); do
            run=$(gh run list \
              --repo "$REPO" \
              --workflow ci.yml \
              --commit "$SHA" \
              --limit 1 \
              --json status,conclusion \
              --jq '.[0]')
            if [[ -z "$run" || "$run" == "null" ]]; then
              echo "No CI run for $SHA yet, waiting..."
              sleep 30
              continue
            fi
            status=$(echo "$run" | jq -r .status)
            conclusion=$(echo "$run" | jq -r .conclusion)
            if [[ "$status" == "completed" ]]; then
              if [[ "$conclusion" == "success" ]]; then
                echo "CI success on $SHA"
                exit 0
              fi
              echo "CI conclusion=$conclusion on $SHA — refuse release" >&2
              exit 1
            fi
            echo "CI status=$status on $SHA, waiting..."
            sleep 30
          done
          echo "Timed out waiting for CI on $SHA" >&2
          exit 1

  jepsen:
    name: Jepsen (release)
    needs: precheck
    uses: ./.github/workflows/jepsen-workflow.yml
    with:
      nemeses: '["partition-halves", "kill", "partition-minio"]'

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: precheck
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      image_tag: ${{ steps.image_tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          flags=(--draft --title "$TAG_NAME" --generate-notes)
          if [[ "$TAG_NAME" == *-* ]]; then
            flags+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
          else
            gh release create "$TAG_NAME" "${flags[@]}"
          fi

      - name: Prepare image tag
        id: image_tag
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          image_tag="${TAG_NAME#v}"
          echo "image_tag=${image_tag//+/-}" >> "$GITHUB_OUTPUT"

  build-image:
    name: Build tagged image
    runs-on: ubuntu-latest
    needs:
      - release
      - jepsen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Stamp build date
        id: stamp
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push tagged image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ needs.release.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ needs.release.outputs.tag_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.stamp.outputs.date }}

      - name: Sign image (cosign keyless)
        env:
          IMAGE: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  build-binaries:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs:
      - release
      - jepsen
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          mkdir -p dist
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X github.com/t4db/t4/internal/version.Version=${TAG_NAME} \
              -X github.com/t4db/t4/internal/version.Commit=${GITHUB_SHA} \
              -X github.com/t4db/t4/internal/version.Date=${DATE}" \
            -o "dist/t4-${GOOS}-${GOARCH}" \
            ./cmd/t4

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/t4-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload binary to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" ./dist/t4-${{ matrix.goos }}-${{ matrix.goarch }} --clobber

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: t4-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/t4-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  checksums:
    name: Publish checksums
    runs-on: ubuntu-latest
    needs:
      - release
      - build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: t4-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum t4-* > checksums.txt

      - name: Sign checksums (cosign keyless)
        run: |
          cd dist
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - name: Upload checksums and signature to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" \
            ./dist/checksums.txt \
            ./dist/checksums.txt.sig \
            ./dist/checksums.txt.pem \
            --clobber
