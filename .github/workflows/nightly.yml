name: Nightly stress test

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC every night
  workflow_dispatch: # allow manual trigger

jobs:
  jepsen:
    uses: ./.github/workflows/jepsen-workflow.yml
    # Nightly runs the full nemesis matrix. Per-PR runs use a smaller smoke
    # matrix (see jepsen.yml).
    with:
      nemeses: '["partition-halves", "kill", "partition-minio"]'

  stress:
    name: Stress (30m)
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: TestLongRunningConsistency (30m)
        run: |
          go test -run TestLongRunningConsistency -v -timeout 35m -count=1 ./tests/integration
        env:
          TEST_DURATION: 30m
