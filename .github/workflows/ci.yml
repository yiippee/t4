name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-generated:
    name: Check Generated Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Regenerate CLI environment reference
        run: go run ./hack/docgen

      - name: Check generated docs are up to date
        run: git diff --exit-code -- docs/configuration.md website/src/content/docs/configuration.md

  test-unit:
    name: Test Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test (unit)
        run: |
          go test -short -timeout 360s -count=1 \
            . \
            ./cmd/t4 \
            ./etcd \
            ./etcd/auth \
            ./internal/... \
            ./pkg/object

  test-integration-linux:
    name: Test Integration (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test (integration)
        run: go test -short -timeout 360s -count=1 ./tests/integration

  test-race-linux:
    name: Test Race (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test (race)
        run: go test -race -timeout 360s -count=1 ./...
